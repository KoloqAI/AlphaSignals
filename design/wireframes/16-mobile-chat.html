<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="./_tokens.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css"><title>Alpha-Signals wireframe</title></head><body><style>
.phone{width:300px;margin:18px auto;border:7px solid #222;border-radius:32px;overflow:hidden;background:var(--color-background-primary);height:600px;display:flex;flex-direction:column;position:relative}
.tb{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.toggle{display:inline-flex;border:0.5px solid var(--color-border-secondary);border-radius:999px;overflow:hidden;font-size:11px}.toggle span{padding:3px 10px}.toggle .act{background:var(--color-background-info);color:var(--color-text-info)}.toggle .ina{color:var(--color-text-tertiary)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
.nav{display:flex;align-items:center;justify-content:space-around;border-top:0.5px solid var(--color-border-tertiary);padding:7px 0 9px;color:var(--color-text-tertiary)}
.nav div{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px}.nav .ti{font-size:19px}.nav .on{color:var(--color-text-info)}
.mn{font-family:var(--font-mono);font-weight:500}.mut{color:var(--color-text-secondary)}.tny{font-size:11px;color:var(--color-text-tertiary)}
.handle{width:30px;height:4px;border-radius:2px;background:var(--color-border-secondary);margin:0 auto 8px}
.pill{font-size:11px;font-weight:500;padding:1px 8px;border-radius:5px;background:var(--color-background-success);color:var(--color-text-success)}
.gauge{height:5px;border-radius:3px;background:var(--color-border-secondary);margin:6px 0 3px;overflow:hidden}.gfill{height:100%;background:var(--color-text-success)}
</style>
<div class="phone">
<div class="tb"><i class="ti ti-menu-2"></i><span style="font-weight:500">Friday Syndicate</span><i class="ti ti-user-circle"></i></div>
<div class="main">
<div style="flex:1;padding:13px;display:flex;flex-direction:column;gap:9px">
<div style="display:flex;gap:8px"><div style="flex:0 0 22px;height:22px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);display:flex;align-items:center;justify-content:center;font-size:11px">DK</div><div style="background:var(--color-background-secondary);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--color-text-secondary)">NVDA strong into earnings — starter?</div></div>
<div style="display:flex;gap:8px"><div style="flex:0 0 22px;height:22px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);display:flex;align-items:center;justify-content:center;font-size:11px">RP</div><div style="background:var(--color-background-secondary);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--color-text-secondary)">agree, putting it to a vote</div></div>
</div>
<div style="border-top:0.5px solid var(--color-border-info);background:var(--color-background-primary);padding:11px 13px 5px">
<div class="handle"></div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px"><span style="font-weight:500;font-size:13px"><i class="ti ti-layers-subtract"></i> Active votes</span><span class="tny">2 open</span></div>
<div style="margin-bottom:9px"><div style="display:flex;align-items:center;gap:6px"><span class="pill">BUY</span><span class="mn" style="font-size:12px">NVDA</span><span class="tny" style="margin-left:auto">3:12</span></div><div class="gauge"><div class="gfill" style="width:60%"></div></div><div class="tny">60% reached</div></div>
<div><div style="display:flex;align-items:center;gap:6px"><span class="pill" style="background:var(--color-background-danger);color:var(--color-text-danger)">SELL</span><span class="mn" style="font-size:12px">TSLA</span><span class="tny" style="margin-left:auto">1:40</span></div><div class="gauge"><div class="gfill" style="width:35%;background:var(--color-text-danger)"></div></div><div class="tny">35%</div></div>
</div>
</div>
<div class="nav"><div><i class="ti ti-message"></i>Chat</div><div><i class="ti ti-chart-candle"></i>Markets</div><div class="on"><i class="ti ti-users"></i>Groups</div><div><i class="ti ti-user"></i>Account</div></div>
</div>
</body></html>
